<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title></title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/game-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="bb-preloader" class="bb-preloader-root" role="status">
      <div class="bb-preloader-content">
        <div class="bb-preloader-spinner" aria-hidden="true"></div>
        <div class="bb-preloader-text">
          <div class="bb-preloader-label"></div>
          <div class="bb-preloader-sublabel"></div>
        </div>
        <div class="bb-preloader-progress">
          <div class="bb-preloader-progress-fill" id="bb-preloader-bar"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
