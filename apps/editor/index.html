<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var pref = null;
        try {
          pref = localStorage.getItem("blackbox-editor-theme-pref");
        } catch {}
        var dark =
          pref === "dark" ||
          (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackbox Editor</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/boot-splash.css" />
    <link rel="stylesheet" href="/xyflow.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="boot-splash" class="boot-splash" aria-hidden="true">
      <div class="boot-loader" role="status" aria-label="Starting editor">
        <div class="boot-loader-ring"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
