appId: com.blackbox.editor
productName: Blackbox Editor
copyright: Copyright © Blackbox
icon: icon.png

directories:
  output: release
  buildResources: resources

files:
  - dist/**
  - electron/**
  - server/**
  - shared/**
  - server.js
  - package.json
  - node_modules/**
  - "!node_modules/**/{test,tests,__tests__,docs,doc}/**"
  - "!**/*.map"

asar: true
electronLanguages:
  - en
  - en-GB
asarUnpack:
  - "node_modules/@fastify/**"
  - "node_modules/fastify/**"

extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Blackbox

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
