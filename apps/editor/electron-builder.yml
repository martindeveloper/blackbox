appId: com.blackbox.editor
productName: Blackbox Editor
copyright: Copyright © Blackbox
icon: icon.png

directories:
  output: release
  buildResources: resources

files:
  - dist/**
  - electron/**
  - players/**
  - server/**
  - shared/**
  - server.js
  - package.json
  - node_modules/**
  - "!node_modules/**/{test,tests,__tests__,docs,doc}/**"
  - "!**/*.map"

asar: true
electronLanguages:
  - en
  - en-GB
asarUnpack:
  - "node_modules/@fastify/**"
  - "node_modules/fastify/**"

extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  # Web player workspace (engine sources + rolldown/tailwind toolchain).
  # Staged by players/web/stage.mjs.
  - from: resources/players/web/workspace
    to: players/web/workspace
    filter:
      - "**/*"
  # Build CLI: web/iOS/Android orchestration + Capacitor + prebuilt WASM.
  # Staged by scripts/stage-cli.mjs; selected at runtime via BLACKBOX_CLI_DIR.
  - from: resources/cli
    to: cli
    filter:
      - "**/*"
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - zip
  icon: icon.png

appx:
  identityName: Blackbox.BlackboxEditor
  applicationId: BlackboxEditor
  publisherDisplayName: Blackbox
  displayName: Blackbox Editor
  artifactName: ${productName}-${version}-${arch}.msix
  publisher: CN=Blackbox
  backgroundColor: "#000000"
  showNameOnTiles: true
  capabilities:
    - runFullTrust
    - internetClient
  languages:
    - en-US

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Blackbox
