[package]
name = "blackbox-wasm"
version = "0.1.0"
edition = "2024"
license.workspace = true

[lints.rust]
unsafe_code = "allow"

[lib]
crate-type = ["cdylib"]
name = "blackbox_wasm"

[dependencies]
blackbox-engine = { package = "blackbox", path = "../core" }
blackbox-format = { path = "../format" }
console_error_panic_hook = "0.1"
js-sys = "0.3"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["console"] }
