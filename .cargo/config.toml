# Keep build artifacts out of the repo root.
[build]
target-dir = ".cache/target"

# Android linker is set per-build by scripts/build-android-aarch64.mjs via
# CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER.

# fdk-aac-sys 0.5.0 bundles libfdk-aac that predates MSVC Windows-on-ARM support.
# cl.exe defines _M_ARM64 but not __aarch64__, so FDK_archdef.h hits an unsupported
# #warning (C1021). Forcing __arm__ via -D breaks hbe.cpp, which uses GCC attributes
# cl.exe cannot parse. clang-cl defines __aarch64__, satisfies the bundled headers,
# and accepts those attributes. GitHub's windows-11-arm image ships clang-cl on PATH.
[env]
CC_aarch64_pc_windows_msvc = "clang-cl"
CXX_aarch64_pc_windows_msvc = "clang-cl"
