name: Editor Linux

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Target architecture
        required: true
        default: x64
        type: choice
        options:
          - x64
          - arm64
  workflow_call:
    inputs:
      architecture:
        description: Target architecture
        required: false
        default: x64
        type: string

permissions:
  contents: read

concurrency:
  group: editor-linux-${{ github.ref }}-${{ inputs.architecture }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Linux ${{ inputs.architecture }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/editor/package-lock.json
            apps/web/package-lock.json

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            .cache/wasm
          key: editor-linux-${{ inputs.architecture }}-${{ hashFiles('apps/editor/package-lock.json', 'apps/web/package-lock.json', 'apps/editor/electron-builder.yml', 'Cargo.lock', 'engine/wasm/Cargo.toml') }}
          restore-keys: |
            editor-linux-${{ inputs.architecture }}-

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: editor-linux
          key: ${{ inputs.architecture }}
          workspaces: . -> .cache/target
          cache-bin: true

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack --version 0.15.0

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install editor dependencies
        run: npm ci --prefix apps/editor

      - name: Build Linux editor
        run: npm run electron:release --prefix apps/editor -- --platform linux --arch ${{ inputs.architecture }}

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: blackbox-editor-linux-${{ inputs.architecture }}
          path: |
            apps/editor/release/*.AppImage
            apps/editor/release/*.deb
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
