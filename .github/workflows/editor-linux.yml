name: Editor Linux

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: editor-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Linux x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/editor/package-lock.json
            apps/web/package-lock.json

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> .cache/target

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack --version 0.15.0

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install editor dependencies
        run: npm ci --prefix apps/editor

      - name: Build Linux editor
        run: npm run electron:release --prefix apps/editor -- --platform linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: blackbox-editor-linux-x64
          path: |
            apps/editor/release/*.AppImage
            apps/editor/release/*.deb
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
