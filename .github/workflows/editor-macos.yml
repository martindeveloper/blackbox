name: Editor macOS

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Target architecture
        required: true
        default: arm64
        type: choice
        options:
          - arm64
          - x64
  workflow_call:
    inputs:
      architecture:
        description: Target architecture
        required: false
        default: arm64
        type: string

permissions:
  contents: read

concurrency:
  group: editor-macos-${{ github.ref }}-${{ inputs.architecture }}
  cancel-in-progress: true

jobs:
  build:
    name: Build macOS ${{ inputs.architecture }}
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/editor/package-lock.json
            apps/web/package-lock.json

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            .cache/wasm
          key: editor-macos-${{ inputs.architecture }}-${{ hashFiles('apps/editor/package-lock.json', 'apps/web/package-lock.json', 'apps/editor/electron-builder.yml', 'Cargo.lock', 'engine/wasm/Cargo.toml') }}
          restore-keys: |
            editor-macos-${{ inputs.architecture }}-

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: editor-macos
          key: ${{ inputs.architecture }}
          workspaces: . -> .cache/target
          cache-binaries: true

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack --version 0.15.0

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install editor dependencies
        run: npm ci --prefix apps/editor

      - name: Build macOS editor
        run: npm run electron:release --prefix apps/editor -- --platform macos --arch ${{ inputs.architecture }}

      - name: Upload macOS packages
        uses: actions/upload-artifact@v7
        with:
          name: blackbox-editor-macos-${{ inputs.architecture }}
          path: apps/editor/release/*.dmg
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
