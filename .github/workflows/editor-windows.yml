name: Editor Windows

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Target architecture
        required: true
        default: x64
        type: choice
        options:
          - x64
          - arm64
  workflow_call:
    inputs:
      architecture:
        description: Target architecture
        required: false
        default: x64
        type: string

permissions:
  contents: read

concurrency:
  group: editor-windows-${{ github.ref }}-${{ inputs.architecture }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows ${{ inputs.architecture }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      XWIN_ARCH: ${{ inputs.architecture == 'arm64' && 'aarch64' || 'x86_64' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore MSVC CRT cache
        id: cache-xwin
        uses: actions/cache@v4
        with:
          path: .cache/cargo-xwin
          key: xwin-v0.22.0-${{ inputs.architecture }}-${{ runner.os }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/editor/package-lock.json
            apps/web/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.architecture }}
          workspaces: . -> .cache/target

      - name: Install Windows cross-build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends llvm-18
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-18/bin/llvm-lib --version

      - name: Install Rust build tools
        run: |
          cargo install --locked wasm-pack --version 0.15.0
          cargo install --locked cargo-xwin --version 0.22.0

      - name: Pre-download MSVC CRT
        if: steps.cache-xwin.outputs.cache-hit != 'true'
        run: cargo xwin cache xwin

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install editor dependencies
        run: npm ci --prefix apps/editor

      - name: Build Windows editor
        run: npm run electron:release --prefix apps/editor -- --platform windows --arch ${{ inputs.architecture }}

      - name: Upload Windows application
        uses: actions/upload-artifact@v7
        with:
          name: blackbox-editor-windows-${{ inputs.architecture }}
          path: apps/editor/release/*.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
