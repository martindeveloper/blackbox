name: Editor Windows

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Target architecture
        required: true
        default: x64
        type: choice
        options:
          - x64
          - arm64
      package_format:
        description: Package format
        required: true
        default: msix
        type: choice
        options:
          - msix
          - zip
          - all
  workflow_call:
    inputs:
      architecture:
        description: Target architecture
        required: false
        default: x64
        type: string
      package_format:
        description: Windows package format (msix, zip, or all)
        required: false
        default: msix
        type: string

permissions:
  contents: read

concurrency:
  group: editor-windows-${{ github.ref }}-${{ inputs.architecture }}-${{ inputs.package_format }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows ${{ inputs.architecture }} (${{ inputs.package_format }})
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/editor/package-lock.json
            apps/web/package-lock.json

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            .cache/wasm
          key: editor-windows-${{ inputs.architecture }}-${{ hashFiles('apps/editor/package-lock.json', 'apps/web/package-lock.json', 'apps/editor/electron-builder.yml', 'Cargo.lock', 'engine/wasm/Cargo.toml') }}
          restore-keys: |
            editor-windows-${{ inputs.architecture }}-

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: editor-windows
          key: ${{ inputs.architecture }}
          workspaces: . -> .cache/target
          cache-bin: true

      - name: Add Rust Windows target
        if: inputs.architecture == 'arm64'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack --version 0.15.0

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install editor dependencies
        run: npm ci --prefix apps/editor

      - name: Build Windows editor
        run: npm run electron:release --prefix apps/editor -- --platform windows --arch ${{ inputs.architecture }} --format ${{ inputs.package_format }}

      - name: Upload Windows packages
        uses: actions/upload-artifact@v7
        with:
          name: blackbox-editor-windows-${{ inputs.architecture }}
          path: |
            apps/editor/release/*.zip
            apps/editor/release/*.msix
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
