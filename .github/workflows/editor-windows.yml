name: Editor Windows

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: Target architecture
        required: true
        default: x64
        type: choice
        options:
          - x64
          - arm64

permissions:
  contents: read

concurrency:
  group: editor-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows ${{ inputs.architecture }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            apps/editor/package-lock.json
            apps/web/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.architecture }}
          workspaces: . -> .cache/target

      - name: Install LLVM tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends llvm-18
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-18/bin/llvm-lib --version

      - name: Install Rust build tools
        run: |
          cargo install --locked wasm-pack --version 0.15.0
          cargo install --locked cargo-xwin --version 0.22.0

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Install editor dependencies
        run: npm ci --prefix apps/editor

      - name: Build Windows editor
        run: npm run electron:release --prefix apps/editor -- --platform windows --arch ${{ inputs.architecture }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: blackbox-editor-windows-${{ inputs.architecture }}
          path: apps/editor/release/*Setup*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
